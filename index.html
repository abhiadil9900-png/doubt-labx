<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Doubt Lab</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">
    <h1>🤖 AI Doubt Lab</h1>
    <p>Learn Concepts the Smart Way</p>

    <div class="card">
      <input
        type="text"
        id="question"
        placeholder="Ask anything..."
      />

      <button onclick="askAI()">
        Ask AI
      </button>
    </div>

    <div class="answer-box" id="result">
      AI answer will appear here...
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
